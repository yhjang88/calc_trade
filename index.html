<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>갑부: 장사의 시대 — 위대한 항로 수익 계산기</title>
<style>

  .card.collapsed .collapsible-body { display: none; }

  select, input[type=number] {

  .special { color: #d97706; }

const STORAGE_KEY = "gabbu_prices_v1";
const MASTER_KEY_STORAGE = "gabbu_master_key";
const REMOTE = {
  binId: "69e5f24736566621a8d0ecbb",
  accessKey: "$2a$10$gP/OMHKwVI0OZzWdAP4vR.42dd8DRRcqZ04lpyRThRvItUUwxyClO",
};

let departure = PORT_ORDER[0];

function normalizePrices(raw) {
  const valid = {};
  for (const p of PORT_ORDER) {
    valid[p] = {};
    for (const it of ITEMS) {
      const v = raw?.[p]?.[it];
      valid[p][it] = (typeof v === "number" && v >= 0) ? Math.floor(v) : (DEFAULT_PRICES[p]?.[it] ?? 0);
    }
  }
  return valid;
}
function loadPrices() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return normalizePrices(JSON.parse(raw));
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_PRICES));
}

async function cloudFetch() {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${REMOTE.binId}/latest`, {
    headers: { "X-Access-Key": REMOTE.accessKey }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.record;
}
async function cloudUpload(payload) {
  let key = localStorage.getItem(MASTER_KEY_STORAGE);
  if (!key) {
    key = prompt("편집자 키(Master Key)를 입력하세요:");
    if (!key) return { ok: false, reason: "취소됨" };
    localStorage.setItem(MASTER_KEY_STORAGE, key.trim());
    key = key.trim();
  }
  const res = await fetch(`https://api.jsonbin.io/v3/b/${REMOTE.binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": key,
      "X-Bin-Versioning": "false",
    },
    body: JSON.stringify(payload),
  });
  if (!res.ok) {
    if (res.status === 401) {
      localStorage.removeItem(MASTER_KEY_STORAGE);
      return { ok: false, reason: "권한 없음(키 오류)" };
    }
    return { ok: false, reason: `HTTP ${res.status}` };
  }
  return { ok: true };
}
function savePrices() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prices));
}
function resetPrices() {
  if (!confirm("모든 가격을 기본값으로 초기화할까요?")) return;
  prices = JSON.parse(JSON.stringify(DEFAULT_PRICES));
  savePrices();
  renderAll();
}

function fmt(n) { return n.toLocaleString(); }

function populatePortSelect(sel, current) {
  sel.innerHTML = "";
  for (const p of PORT_ORDER) {
    const opt = document.createElement("option");
    opt.value = p;
    opt.textContent = `${p}  [특산품: ${SPECIALS[p]}]`;
    if (p === current) opt.selected = true;
    sel.appendChild(opt);
  }
}

function renderPriceTable() {

  tbody.innerHTML = "";
  for (const item of ITEMS) {
    const tr = document.createElement("tr");
    const isSpecial = item === SPECIALS[editPort];

      <td>${item}</td>
      <td>${isSpecial ? '<span class="special">⭐</span>' : ''}</td>
      <td class="num">
        <input type="number" class="price-input" min="0" step="1" value="${prices[editPort][item]}" data-item="${item}">
      </td>`;
    tbody.appendChild(tr);
  }
  tbody.querySelectorAll("input.price-input").forEach(inp => {
    inp.addEventListener("input", e => {
      const item = e.target.dataset.item;
      const val = Math.max(0, parseInt(e.target.value || "0", 10));
      prices[editPort][item] = val;
    });
  });
}

function computeBestPerItem(from) {
  const dep = prices[from];
  const list = [];
  for (const item of ITEMS) {
    const buy = dep[item];
    if (buy <= 0) continue;
    let best = null;
    for (const dest of PORT_ORDER) {
      if (dest === from) continue;
      const sell = prices[dest][item];
      if (sell <= 0 || sell <= buy) continue;
      const profit = sell - buy;
      const rate = profit / buy;
      if (!best || rate > best.rate) {
        best = { dest, item, buy, sell, profit, rate };
      }
    }
    if (best) list.push(best);
  }
  list.sort((a,b) => b.rate - a.rate);
  return list;
}

function computeForDest(from, dest) {
  const dep = prices[from];
  const list = [];
  for (const item of ITEMS) {
    const buy = dep[item];
    const sell = prices[dest][item];
    if (buy <= 0 || sell <= 0 || sell <= buy) continue;
    const profit = sell - buy;
    list.push({ item, buy, sell, profit, rate: profit/buy });
  }
  list.sort((a,b) => b.rate - a.rate);
  return list;
}

function renderTop() {
  const top = computeBestPerItem(departure).slice(0, 10);
  document.getElementById("topTitle").textContent = `📊 ${departure} 출발 — 화물별 최고 수익 Top 10`;

  const metricsBox = document.getElementById("metricsBox");
  const content = document.getElementById("topContent");
  const hint = document.getElementById("topHint");

  if (top.length === 0) {
    metricsBox.innerHTML = "";
    content.innerHTML = '<div class="empty">수익이 나는 화물이 없습니다. 가격을 입력해주세요.</div>';
    hint.style.display = "none";
    return;
  }

  const medals = ["🥇","🥈","🥉"];
  metricsBox.innerHTML = top.slice(0,3).map((r,i) => `
    <div class="metric">
      <div class="label">${medals[i]} ${r.dest} · ${r.item}</div>
      <div class="value">${fmtRate(r.rate)}</div>
      <div class="sub">차익 +${fmt(r.profit)}</div>
    </div>
  `).join("");

  content.innerHTML = `
    <table>
      <thead>
        <tr><th class="rank">#</th><th>도착지</th><th>화물</th>
          <th class="num">구매가격</th><th class="num">판매가격</th>
          <th class="num">차익</th><th class="num">수익률</th></tr>
      </thead>
      <tbody>
        ${top.map((r,i) => `
          <tr class="clickable ${selectedDest === r.dest ? 'selected' : ''}" data-dest="${r.dest}">
            <td class="rank">${i+1}</td>
            <td>${r.dest}</td>
            <td>${r.item}${r.item === SPECIALS[departure] ? ' <span class="special">⭐</span>' : ''}</td>
            <td class="num">${fmt(r.buy)}</td>
            <td class="num">${fmt(r.sell)}</td>
            <td class="num positive">+${fmt(r.profit)}</td>
            <td class="num positive">${fmtRate(r.rate)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;

  hint.style.display = "block";
  content.querySelectorAll("tr.clickable").forEach(tr => {
    tr.addEventListener("click", () => {
      selectedDest = tr.dataset.dest;
      renderTop();
      renderDest();
      document.getElementById("destCard").scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
  });
}

function renderDest() {
  if (!selectedDest) {
    document.getElementById("destCard").style.display = "none";
    return;
  }
  const card = document.getElementById("destCard");
  card.style.display = "block";
  document.getElementById("destTitle").textContent = `📦 ${departure} → ${selectedDest}  화물 수익률 Top 10`;

  const list = computeForDest(departure, selectedDest).slice(0, 10);
  const content = document.getElementById("destContent");

  if (list.length === 0) {
    content.innerHTML = `<div class="empty">${selectedDest}로 보낼 때 이익이 나는 화물이 없습니다.</div>`;
    return;
  }

  content.innerHTML = `
    <table>
      <thead>
        <tr><th class="rank">#</th><th>화물</th>
          <th class="num">구매가격</th><th class="num">판매가격</th>
          <th class="num">차익</th><th class="num">수익률</th></tr>
      </thead>
      <tbody>
        ${list.map((r,i) => `
          <tr>
            <td class="rank">${i+1}</td>
            <td>${r.item}${r.item === SPECIALS[departure] ? ' <span class="special">⭐</span>' : ''}</td>
            <td class="num">${fmt(r.buy)}</td>
            <td class="num">${fmt(r.sell)}</td>
            <td class="num positive">+${fmt(r.profit)}</td>
            <td class="num positive">${fmtRate(r.rate)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;
}

function renderAll() {
  populatePortSelect(document.getElementById("departure"), departure);
  populatePortSelect(document.getElementById("editPort"), editPort);
  renderPriceTable();
  renderTop();
  renderDest();
}

document.getElementById("departure").addEventListener("change", e => {
  departure = e.target.value;
  selectedDest = null;
  renderTop();
  renderDest();
});
document.getElementById("editPort").addEventListener("change", e => {
  editPort = e.target.value;
  renderPriceTable();
});
function flashStatus(msg, color) {
  const status = document.getElementById("saveStatus");
  status.textContent = msg;
  status.style.color = color || "#16a34a";
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => { status.textContent = ""; }, 2000);
}

document.getElementById("saveBtn").addEventListener("click", async () => {
  savePrices();
  renderTop();
  if (selectedDest) renderDest();
  flashStatus("☁️ 업로드 중...");
  const result = await cloudUpload(prices);
  if (result.ok) {
    flashStatus("☁️ 클라우드 저장 완료");
  } else {
    flashStatus(`❌ ${result.reason} (로컬은 저장됨)`, "#dc2626");
  }
});

document.getElementById("refreshBtn").addEventListener("click", async () => {
  flashStatus("🔄 불러오는 중...");
  try {
    const remote = await cloudFetch();
    prices = normalizePrices(remote || {});
    savePrices();
    renderPriceTable();
    renderTop();
    if (selectedDest) renderDest();
    flashStatus("✅ 최신 데이터 불러옴");
  } catch (e) {
    flashStatus(`❌ 불러오기 실패: ${e.message}`, "#dc2626");
  }
});

document.getElementById("clearKeyBtn").addEventListener("click", () => {
  if (localStorage.getItem(MASTER_KEY_STORAGE)) {
    if (confirm("저장된 Master Key를 삭제할까요? (다음 저장 시 다시 입력해야 합니다)")) {
      localStorage.removeItem(MASTER_KEY_STORAGE);
      flashStatus("🔑 키 삭제됨");
    }
  } else {
    flashStatus("저장된 키가 없습니다", "#6b7380");
  }
});

// 페이지 로드 시 클라우드에서 자동으로 최신 데이터 가져오기
(async () => {
  try {
    const remote = await cloudFetch();
    if (remote && typeof remote === "object") {
      prices = normalizePrices(remote);
      savePrices();
      renderPriceTable();
      renderTop();
      if (selectedDest) renderDest();
      flashStatus("☁️ 클라우드 데이터 로드됨");
    }
  } catch (e) {
    console.warn("Remote fetch failed:", e);
  }
})();

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(prices, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const ts = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `gabbu_prices_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
  flashStatus("📥 파일 다운로드됨");
});

document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});

document.getElementById("importFile").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const valid = {};
      for (const p of PORT_ORDER) {
        valid[p] = {};
        for (const it of ITEMS) {
          const v = data?.[p]?.[it];
          valid[p][it] = (typeof v === "number" && v >= 0) ? Math.floor(v) : (DEFAULT_PRICES[p]?.[it] ?? 0);
        }
      }
      prices = valid;
      savePrices();
      renderPriceTable();
      renderTop();
      if (selectedDest) renderDest();
      flashStatus("✅ 불러오기 완료");
    } catch (err) {
      flashStatus("❌ 파일이 올바르지 않습니다", "#dc2626");
    }
    e.target.value = "";
  };
  reader.readAsText(file);
});

// 2번 섹션 접기/펼치기
const COLLAPSE_KEY = "gabbu_price_collapsed";
const priceCard = document.getElementById("priceCard");
if (localStorage.getItem(COLLAPSE_KEY) === "1") priceCard.classList.add("collapsed");
document.getElementById("priceToggle").addEventListener("click", () => {
  priceCard.classList.toggle("collapsed");
  localStorage.setItem(COLLAPSE_KEY, priceCard.classList.contains("collapsed") ? "1" : "0");
});

renderAll();
</script>
