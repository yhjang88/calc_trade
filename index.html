<script>
const PORT_ORDER = [
  "평경", "개경", "명주", "천주", "광주", "담수", "안남", "브루나이",
  "섬라국", "크메르", "술루", "스리비자야", "말레이", "버마",
  "천축", "실론", "페르시아", "대식국", "미스르", "바스라"
];

const SPECIALS = {
  "평경": "목재",
  "개경": "녹용",
  "명주": "도자기",
  "천주": "녹차",
  "광주": "비단",
  "담수": "진주",
  "안남": "벼",
  "브루나이": "제비집",
  "섬라국": "상아",
  "크메르": "파인애플",
  "술루": "꽃게",
  "스리비자야": "술",
  "말레이": "어육",
  "버마": "철광석",
  "천축": "향료",
  "실론": "야자",
  "페르시아": "수정",
  "대식국": "옥 제품",
  "미스르": "피혁",
  "바스라": "백은"
};

const ITEMS = [
  "목재", "녹용", "도자기", "녹차", "비단", "진주", "벼", "제비집",
  "상아", "파인애플", "꽃게", "술", "어육", "철광석", "향료", "야자",
  "수정", "옥 제품", "피혁", "백은"
];

const STORAGE_KEY = "gabbu_prices_v1";
const MASTER_KEY_STORAGE = "gabbu_master_key";
const COLLAPSE_KEY = "gabbu_price_collapsed";
const REMOTE = {
  binId: "69e5f28b36566621a8d0ee08",
  accessKey: "$2a$10$gP/OMHKwVI0OZzWdAP4vR.42dd8DRRcqZ04lpyRThRvItUUwxyClO",
};

let prices = loadPrices();
let departure = PORT_ORDER[0];
let editPort = PORT_ORDER[0];
let selectedDest = null;

function createEmptyPrices() {
  const base = {};
  for (const port of PORT_ORDER) {
    base[port] = {};
    for (const item of ITEMS) {
      base[port][item] = 0;
    }
  }
  return base;
}

function coercePrice(value) {
  if (typeof value === "object" && value !== null) {
    value = value.buy ?? value.sell ?? 0;
  }
  return typeof value === "number" && value >= 0 ? Math.floor(value) : 0;
}

function normalizePrices(raw) {
  const normalized = createEmptyPrices();
  for (const port of PORT_ORDER) {
    for (const item of ITEMS) {
      normalized[port][item] = coercePrice(raw?.[port]?.[item]);
    }
  }
  return normalized;
}

function loadPrices() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return normalizePrices(JSON.parse(raw));
  } catch (error) {
    console.warn("Local cache parse failed:", error);
  }
  return createEmptyPrices();
}

function savePrices() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prices));
}

function hasAnyPrice(data) {
  for (const port of PORT_ORDER) {
    for (const item of ITEMS) {
      if ((data?.[port]?.[item] ?? 0) > 0) return true;
    }
  }
  return false;
}

function replacePrices(next) {
  prices = normalizePrices(next || {});
  savePrices();
  renderAll();
}

async function cloudFetch() {
  const response = await fetch(`https://api.jsonbin.io/v3/b/${REMOTE.binId}/latest`, {
    headers: { "X-Access-Key": REMOTE.accessKey }
  });
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const data = await response.json();
  return data.record;
}

async function cloudUpload(payload) {
  let key = localStorage.getItem(MASTER_KEY_STORAGE);
  if (!key) {
    key = prompt("Master Key를 입력하세요:");
    if (!key) return { ok: false, reason: "cancelled" };
    key = key.trim();
    localStorage.setItem(MASTER_KEY_STORAGE, key);
  }

  const response = await fetch(`https://api.jsonbin.io/v3/b/${REMOTE.binId}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": key,
      "X-Bin-Versioning": "false",
    },
    body: JSON.stringify(payload),
  });

  if (!response.ok) {
    let detail = "";
    try {
      detail = JSON.stringify(await response.json());
    } catch {
      detail = await response.text();
    }
    console.error("cloudUpload failed:", response.status, detail);
    if (response.status === 401) {
      localStorage.removeItem(MASTER_KEY_STORAGE);
      return { ok: false, reason: "master key expired or invalid" };
    }
    return { ok: false, reason: `HTTP ${response.status} ${detail.slice(0, 80)}` };
  }

  return { ok: true };
}

function fmt(n) {
  return n.toLocaleString();
}

function fmtRate(rate) {
  return `${(rate * 100).toFixed(1)}%`;
}

function flashStatus(message, color = "#16a34a") {
  const status = document.getElementById("saveStatus");
  status.textContent = message;
  status.style.color = color;
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => {
    status.textContent = "";
  }, 3000);
}

function populatePortSelect(select, current) {
  select.innerHTML = "";
  for (const port of PORT_ORDER) {
    const option = document.createElement("option");
    option.value = port;
    option.textContent = `${port} [특산품 ${SPECIALS[port]}]`;
    option.selected = port === current;
    select.appendChild(option);
  }
}

function renderPriceTable() {
  const tbody = document.querySelector("#priceTable tbody");
  tbody.innerHTML = "";

  for (const item of ITEMS) {
    const isSpecial = item === SPECIALS[editPort];
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${item}</td>
      <td>${isSpecial ? '<span class="special">특산</span>' : ""}</td>
      <td class="num">
        <input type="number" class="price-input" min="0" step="1" value="${prices[editPort][item]}" data-item="${item}">
      </td>
    `;
    tbody.appendChild(tr);
  }

  tbody.querySelectorAll("input.price-input").forEach((input) => {
    input.addEventListener("input", (event) => {
      const item = event.target.dataset.item;
      const next = Math.max(0, parseInt(event.target.value || "0", 10));
      prices[editPort][item] = Number.isFinite(next) ? next : 0;
    });
  });
}

function computeBestPerItem(from) {
  const source = prices[from];
  const results = [];

  for (const item of ITEMS) {
    const buy = source[item];
    if (buy <= 0) continue;

    let best = null;
    for (const dest of PORT_ORDER) {
      if (dest === from) continue;
      const sell = prices[dest][item];
      if (sell <= buy) continue;

      const profit = sell - buy;
      const rate = profit / buy;
      if (!best || rate > best.rate) {
        best = { dest, item, buy, sell, profit, rate };
      }
    }

    if (best) results.push(best);
  }

  results.sort((a, b) => b.rate - a.rate);
  return results;
}

function computeForDest(from, dest) {
  const results = [];
  for (const item of ITEMS) {
    const buy = prices[from][item];
    const sell = prices[dest][item];
    if (buy <= 0 || sell <= buy) continue;

    const profit = sell - buy;
    results.push({ item, buy, sell, profit, rate: profit / buy });
  }

  results.sort((a, b) => b.rate - a.rate);
  return results;
}

function renderTop() {
  const top = computeBestPerItem(departure).slice(0, 10);
  document.getElementById("topTitle").textContent = `📊 ${departure} 출발 화물별 최고 수익 Top 10`;

  const metricsBox = document.getElementById("metricsBox");
  const content = document.getElementById("topContent");
  const hint = document.getElementById("topHint");

  if (top.length === 0) {
    metricsBox.innerHTML = "";
    content.innerHTML = '<div class="empty">표시할 수익 경로가 없습니다. 가격 데이터를 확인해 주세요.</div>';
    hint.style.display = "none";
    return;
  }

  const medals = ["🥇", "🥈", "🥉"];
  metricsBox.innerHTML = top.slice(0, 3).map((row, index) => `
    <div class="metric">
      <div class="label">${medals[index]} ${row.dest} / ${row.item}</div>
      <div class="value">${fmtRate(row.rate)}</div>
      <div class="sub">차익 +${fmt(row.profit)}</div>
    </div>
  `).join("");

  content.innerHTML = `
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>도착지</th>
          <th>화물</th>
          <th class="num">구매가</th>
          <th class="num">판매가</th>
          <th class="num">차익</th>
          <th class="num">수익률</th>
        </tr>
      </thead>
      <tbody>
        ${top.map((row, index) => `
          <tr class="clickable ${selectedDest === row.dest ? "selected" : ""}" data-dest="${row.dest}">
            <td class="rank">${index + 1}</td>
            <td>${row.dest}</td>
            <td>${row.item}${row.item === SPECIALS[departure] ? ' <span class="special">특산</span>' : ""}</td>
            <td class="num">${fmt(row.buy)}</td>
            <td class="num">${fmt(row.sell)}</td>
            <td class="num positive">+${fmt(row.profit)}</td>
            <td class="num positive">${fmtRate(row.rate)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;

  hint.style.display = "block";
  content.querySelectorAll("tr.clickable").forEach((row) => {
    row.addEventListener("click", () => {
      selectedDest = row.dataset.dest;
      renderTop();
      renderDest();
      document.getElementById("destCard").scrollIntoView({ behavior: "smooth", block: "nearest" });
    });
  });
}

function renderDest() {
  const card = document.getElementById("destCard");
  const content = document.getElementById("destContent");

  if (!selectedDest) {
    card.style.display = "none";
    return;
  }

  card.style.display = "block";
  document.getElementById("destTitle").textContent = `📦 ${departure} → ${selectedDest} 수익률 Top 10`;

  const rows = computeForDest(departure, selectedDest).slice(0, 10);
  if (rows.length === 0) {
    content.innerHTML = `<div class="empty">${selectedDest}에서 이익이 나는 화물이 없습니다.</div>`;
    return;
  }

  content.innerHTML = `
    <table>
      <thead>
        <tr>
          <th class="rank">#</th>
          <th>화물</th>
          <th class="num">구매가</th>
          <th class="num">판매가</th>
          <th class="num">차익</th>
          <th class="num">수익률</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map((row, index) => `
          <tr>
            <td class="rank">${index + 1}</td>
            <td>${row.item}${row.item === SPECIALS[departure] ? ' <span class="special">특산</span>' : ""}</td>
            <td class="num">${fmt(row.buy)}</td>
            <td class="num">${fmt(row.sell)}</td>
            <td class="num positive">+${fmt(row.profit)}</td>
            <td class="num positive">${fmtRate(row.rate)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  `;
}

function renderAll() {
  populatePortSelect(document.getElementById("departure"), departure);
  populatePortSelect(document.getElementById("editPort"), editPort);
  renderPriceTable();
  renderTop();
  renderDest();
}

document.getElementById("departure").addEventListener("change", (event) => {
  departure = event.target.value;
  selectedDest = null;
  renderTop();
  renderDest();
});

document.getElementById("editPort").addEventListener("change", (event) => {
  editPort = event.target.value;
  renderPriceTable();
});

document.getElementById("saveBtn").addEventListener("click", async () => {
  savePrices();
  renderTop();
  if (selectedDest) renderDest();

  flashStatus("Uploading...");
  const result = await cloudUpload(prices);
  if (result.ok) {
    flashStatus("Cloud save complete");
  } else {
    flashStatus(`Save failed: ${result.reason}`, "#dc2626");
  }
});

document.getElementById("refreshBtn").style.display = "";
document.getElementById("refreshBtn").addEventListener("click", async () => {
  flashStatus("Refreshing...");
  try {
    const remote = await cloudFetch();
    replacePrices(remote);
    flashStatus("Latest data loaded");
  } catch (error) {
    flashStatus(`Refresh failed: ${error.message}`, "#dc2626");
  }
});

document.getElementById("clearKeyBtn").style.display = "";
document.getElementById("clearKeyBtn").addEventListener("click", () => {
  if (!localStorage.getItem(MASTER_KEY_STORAGE)) {
    flashStatus("No saved key", "#6b7380");
    return;
  }

  if (confirm("저장된 Master Key를 삭제할까요? 다음 저장 시 다시 입력해야 합니다.")) {
    localStorage.removeItem(MASTER_KEY_STORAGE);
    flashStatus("Saved key removed");
  }
});

document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(prices, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const date = new Date().toISOString().slice(0, 10);
  link.href = url;
  link.download = `gabbu_prices_${date}.json`;
  link.click();
  URL.revokeObjectURL(url);
  flashStatus("JSON exported");
});

document.getElementById("importBtn").addEventListener("click", () => {
  document.getElementById("importFile").click();
});

document.getElementById("importFile").addEventListener("change", (event) => {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (loadEvent) => {
    try {
      const data = JSON.parse(loadEvent.target.result);
      replacePrices(data);
      flashStatus("Import complete");
    } catch (error) {
      flashStatus("Invalid file", "#dc2626");
    }
    event.target.value = "";
  };
  reader.readAsText(file);
});

const priceCard = document.getElementById("priceCard");
if (localStorage.getItem(COLLAPSE_KEY) === "1") {
  priceCard.classList.add("collapsed");
}

document.getElementById("priceToggle").addEventListener("click", () => {
  priceCard.classList.toggle("collapsed");
  localStorage.setItem(COLLAPSE_KEY, priceCard.classList.contains("collapsed") ? "1" : "0");
});

renderAll();

(async () => {
  try {
    const remote = await cloudFetch();
    if (remote && typeof remote === "object") {
      replacePrices(remote);
      flashStatus("Cloud data loaded");
    }
  } catch (error) {
    console.warn("Remote fetch failed:", error);
    if (hasAnyPrice(prices)) {
      flashStatus(`JSONBin fetch failed: ${error.message} (using local cache)`, "#d97706");
    } else {
      flashStatus(`JSONBin fetch failed: ${error.message}`, "#dc2626");
    }
  }
})();
</script>
